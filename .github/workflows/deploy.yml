name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          # 替换 wrangler.toml 中的占位符
          sed -i "s/YOUR_D1_ID/${{ secrets.D1_ID }}/g" wrangler.toml
          sed -i "s/YOUR_KV_ID/${{ secrets.KV_ID }}/g" wrangler.toml
          wrangler deploy

      - name: Initialize D1 Tables
        run: |
          wrangler d1 execute birthday-db --command "
            CREATE TABLE IF NOT EXISTS users (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              username TEXT UNIQUE,
              password_hash TEXT,
              api_key TEXT UNIQUE NOT NULL,
              role TEXT DEFAULT 'user',
              created_at DATETIME DEFAULT CURRENT_TIMESTAMP
            );
            CREATE TABLE IF NOT EXISTS birthdays (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              user_id INTEGER NOT NULL,
              name TEXT NOT NULL,
              birth_date TEXT NOT NULL,
              is_solar INTEGER NOT NULL DEFAULT 1,
              phone TEXT,
              note TEXT,
              created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
              FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE
            );
            CREATE TABLE IF NOT EXISTS notification_channels (
              id INTEGER PRIMARY KEY AUTOINCREMENT,
              user_id INTEGER NOT NULL,
              name TEXT NOT NULL,
              type TEXT NOT NULL,
              enabled INTEGER NOT NULL DEFAULT 1,
              created_at DATETIME DEFAULT CURRENT_TIMESTAMP,
              FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE
            );
          "
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set Secrets (optional)
        run: |
          # 若设置了管理员账号和多用户开关，则注入
          if [ -n "${{ secrets.ADMIN_USERNAME }}" ]; then
            echo "${{ secrets.ADMIN_USERNAME }}" | wrangler secret put ADMIN_USERNAME
          fi
          if [ -n "${{ secrets.ADMIN_PASSWORD }}" ]; then
            echo "${{ secrets.ADMIN_PASSWORD }}" | wrangler secret put ADMIN_PASSWORD
          fi
          if [ -n "${{ secrets.MULTI_USER }}" ]; then
            echo "${{ secrets.MULTI_USER }}" | wrangler secret put MULTI_USER
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
