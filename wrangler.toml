name = "birthday-reminder"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "birthday-db"
database_id = "YOUR_D1_ID"   # 用户需替换为实际ID

# KV 命名空间
[[kv_namespaces]]
binding = "TOKENS"
id = "YOUR_KV_ID"            # 用户需替换为实际ID

# 定时触发器 (每天 UTC 0:00，即北京时间 8:00)
[triggers]
crons = ["0 0 * * *"]

# 环境变量（通过 wrangler secret 注入敏感信息，此处仅定义）
[vars]
MULTI_USER = "false"         # 默认关闭多用户注册，可通过 secret 覆盖